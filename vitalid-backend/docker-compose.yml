version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vitalid-postgres
    environment:
      POSTGRES_DB: vitalid_db
      POSTGRES_USER: vitalid_user
      POSTGRES_PASSWORD: vitalid_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalid_user"]
      timeout: 20s
      retries: 10

  vitalid-backend:
    build: .
    container_name: vitalid-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vitalid_db
      SPRING_DATASOURCE_USERNAME: vitalid_user
      SPRING_DATASOURCE_PASSWORD: vitalid_password
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
