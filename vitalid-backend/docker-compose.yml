services:
  postgres:
    image: postgres:16
    container_name: vitalid-postgres
    restart: always
    environment:
      POSTGRES_DB: vitalid_db
      POSTGRES_USER: vitalid_user
      POSTGRES_PASSWORD: vitalid_password
    ports:
      - "5433:5432"
    volumes:
      - vitalid_postgres_data:/var/lib/postgresql/data
    networks:
      - vitalid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalid_user -d vitalid_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  vitalid-backend:
    build: .
    container_name: vitalid-backend
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vitalid_db
      SPRING_DATASOURCE_USERNAME: vitalid_user
      SPRING_DATASOURCE_PASSWORD: vitalid_password
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.1-8b-instant}
    ports:
      - "8080:8080"
    networks:
      - vitalid-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: vitalid-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - vitalid-network

volumes:
  vitalid_postgres_data:

networks:
  vitalid-network:
    driver: bridge
