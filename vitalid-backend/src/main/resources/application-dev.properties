spring.application.name=vitalid-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/vitalid_db
spring.datasource.username=vitalid_user
spring.datasource.password=vitalid_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

app.jwtSecret=mySecretKeyVeryLongAndSecureKeyForSigningTokens123456
app.jwtExpirationMs=86400000

logging.level.root=INFO
logging.level.com.vitalid=DEBUG