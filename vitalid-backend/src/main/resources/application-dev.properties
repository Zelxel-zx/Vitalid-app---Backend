spring.application.name=vitalid-backend

server.port=${PORT:8080}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/vitalid_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vitalid_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vitalid_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

app.jwtSecret=${APP_JWT_SECRET:mySecretKeyVeryLongAndSecureKeyForSigningTokens123456}
app.jwtExpirationMs=${APP_JWT_EXPIRATION_MS:86400000}

# Email
spring.mail.host=${SPRING_MAIL_HOST:mailhog}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}

app.notifications.enabled=${APP_NOTIFICATIONS_ENABLED:true}
app.notifications.from=${APP_NOTIFICATIONS_FROM:no-reply@vitalid.test}

# Spring AI / RAG
spring.ai.google.genai.api-key=REPLACE_WITH_GEMINI_API_KEY
spring.ai.google.genai.chat.model=gemini-1.5-flash
spring.ai.google.genai.embedding.model=text-embedding-004
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768

logging.level.root=INFO
logging.level.com.vitalid=DEBUG
