# Development Environment Configuration
spring.application.name=vitalid-backend
server.port=8080

# ===== H2 Database (Development) =====
spring.datasource.url=jdbc:h2:mem:vitaliddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA/Hibernate Configuration =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 Console (para ver BD en desarrollo) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Flyway Configuration =====
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===== JWT Configuration =====
app.jwtSecret=mySecretKeyVeryLongAndSecureKeyForSigningTokens123456
app.jwtExpirationMs=86400000

# ===== Logging =====
logging.level.root=INFO
logging.level.com.vitalid=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# ===== Spring DevTools =====
spring.devtools.restart.enabled=true

# ===== Jackson Configuration =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC