# Spring Boot
spring.application.name=vitalid-backend
server.port=${PORT:8080}
spring.jackson.time-zone=America/Lima

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vitalid_db}
spring.datasource.username=${DB_USER:vitalid_user}
spring.datasource.password=${DB_PASSWORD:vitalid_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwtSecret=mySecretKeyVeryLongAndSecureKeyForSigningTokens123456
app.jwtExpirationMs=86400000

# Email (local)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.notifications.enabled=true
app.notifications.from=no-reply@vitalid.test

# Gemini AI / RAG
app.ai.gemini.api-key=REPLACE_WITH_GEMINI_API_KEY
app.ai.gemini.chat-model=gemini-1.5-flash

# Logging
logging.level.root=INFO
logging.level.com.vitalid=DEBUG

