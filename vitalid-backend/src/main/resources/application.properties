# Spring Boot
spring.application.name=vitalid-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vitalid_db
spring.datasource.username=vitalid_user
spring.datasource.password=vitalid_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwtSecret=mySecretKeyVeryLongAndSecureKeyForSigningTokens123456
app.jwtExpirationMs=86400000

# Logging
logging.level.root=INFO
logging.level.com.vitalid=DEBUG
